name: CI

on:
  push:
    branches: [main, devel]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake build-essential \
            libeigen3-dev libboost-dev libboost-program-options-dev \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool \
            texlive-latex-base texlive-latex-recommended \
            lp-solve liblpsolve55-dev \
            pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            cmake \
            eigen boost \
            gmp mpfr \
            autoconf automake libtool \
            basictex \
            pkg-config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Build cddlib
        run: |
          CDDLIB_SRC="$PWD/bin/deps/cddlib"
          CDDLIB_PREFIX="$CDDLIB_SRC/install"
          cd "$CDDLIB_SRC"
          sed -i.bak '/AX_CHECK_COMPILE_FLAG/d' configure.ac
          autoreconf -i
          ./configure --prefix="$CDDLIB_PREFIX"
          make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu) SUBDIRS="lib-src src"
          make install SUBDIRS="lib-src src"
          GMP_PREFIX=$(brew --prefix gmp 2>/dev/null || echo "")
          GMP_CFLAGS=${GMP_PREFIX:+-I$GMP_PREFIX/include}
          GMP_LDFLAGS=${GMP_PREFIX:+-L$GMP_PREFIX/lib}
          echo "CFLAGS=-I$CDDLIB_PREFIX/include $GMP_CFLAGS" >> $GITHUB_ENV
          echo "LDFLAGS=-L$CDDLIB_PREFIX/lib $GMP_LDFLAGS" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build dependencies
        run: bash configure.sh

      - name: Run test
        run: |
          output=$(./ttc example/box_or_lra.smt2 2>&1)
          echo "$output"
          echo "$output" | grep -E '^s vol [0-9]+(\.[0-9]+)?' \
            || { echo "ERROR: expected 's vol <float>' line not found in output"; exit 1; }
